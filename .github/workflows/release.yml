# Triggered by any tag push (e.g. git tag -a 1.0.0 -m "1.0.0" && git push --follow-tags).
#
# IMPORTANT: Obsidian matches the GitHub release tag EXACTLY against manifest.json "version".
# Tags must NOT have a leading "v" — use "1.0.0", not "v1.0.0".
#
# This workflow strips a leading "v" automatically so it works either way,
# and fails with a clear error if the tag version doesn't match manifest.json.

name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write       # required for artifact attestation
  attestations: write   # required for artifact attestation

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build plugin
        run: npm run build

      # Strip a leading "v" from the tag so "v1.0.0" and "1.0.0" both produce "1.0.0".
      # Obsidian requires the release tag to match manifest.json "version" exactly.
      - name: Resolve version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # Hard-fail if the tag doesn't match manifest.json — catches forgotten version bumps.
      - name: Verify version matches manifest.json
        run: |
          MANIFEST=$(node -p "require('./manifest.json').version")
          TAG_VER="${{ steps.version.outputs.VERSION }}"
          if [ "$TAG_VER" != "$MANIFEST" ]; then
            echo "❌  Tag version ($TAG_VER) doesn't match manifest.json ($MANIFEST)."
            echo "    Run: node version-bump.mjs $TAG_VER"
            echo "    Then commit, re-tag, and push again."
            exit 1
          fi
          echo "✅  Version $MANIFEST verified."

      # Attest provenance for the three files Obsidian downloads from the release.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      # Creates the GitHub release tagged with the plain version number (no "v").
      # Obsidian downloads main.js, manifest.json, and styles.css from this release.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            main.js
            manifest.json
            styles.css
