# Triggered when you push a version tag (e.g. git tag -a 1.0.0 -m "1.0.0" && git push --follow-tags).
# Builds the plugin and attaches main.js + manifest.json + styles.css to a GitHub Release.
# Obsidian downloads those assets when users install the plugin.

name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build plugin
        run: npm run build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Attach only the three files Obsidian needs to load the plugin.
          # Do NOT attach node_modules, source files, or anything else.
          files: |
            main.js
            manifest.json
            styles.css
